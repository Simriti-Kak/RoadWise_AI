<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>RoadWise Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;family=JetBrains+Mono:wght@700&amp;family=Space+Grotesk:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes emerald-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 194, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 194, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 194, 0); }
        }
        .recording-pulse {
            animation: emerald-pulse 2s infinite;
        }
        .pothole-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.1); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#004e5a",
                        "on-surface": "#e2e2e2",
                        "surface-container": "#1f1f1f",
                        "on-background": "#e2e2e2",
                        "secondary-fixed": "#ffe16d",
                        "surface-container-highest": "#353535",
                        "surface-variant": "#353535",
                        "error-container": "#93000a",
                        "surface-container-low": "#1b1b1b",
                        "surface": "#131313",
                        "primary-fixed": "#36ffc4",
                        "on-tertiary-fixed": "#001f25",
                        "on-tertiary": "#00363f",
                        "on-secondary": "#3a3000",
                        "inverse-on-surface": "#303030",
                        "on-secondary-fixed-variant": "#544600",
                        "secondary-fixed-dim": "#e9c400",
                        "on-primary-fixed": "#002116",
                        "surface-dim": "#131313",
                        "tertiary": "#fcfeff",
                        "tertiary-container": "#9fedff",
                        "surface-container-lowest": "#0e0e0e",
                        "on-primary-container": "#007255",
                        "secondary": "#fff9ef",
                        "on-primary-fixed-variant": "#00513c",
                        "inverse-primary": "#006c50",
                        "surface-container-high": "#2a2a2a",
                        "secondary-container": "#ffdb3c",
                        "surface-tint": "#00e1ab",
                        "on-error": "#690005",
                        "inverse-surface": "#e2e2e2",
                        "background": "#131313",
                        "outline": "#83958c",
                        "outline-variant": "#3a4a43",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#00daf8",
                        "primary-fixed-dim": "#00e1ab",
                        "surface-bright": "#393939",
                        "on-primary": "#003828",
                        "on-tertiary-container": "#006e7e",
                        "tertiary-fixed": "#a5eeff",
                        "on-secondary-fixed": "#221b00",
                        "on-secondary-container": "#725f00",
                        "on-surface-variant": "#b9cbc1",
                        "primary-container": "#00ffc2",
                        "primary": "#fbfffa",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit-1": "4px",
                        "base": "4px",
                        "unit-4": "16px",
                        "unit-12": "48px",
                        "unit-2": "8px",
                        "unit-6": "24px",
                        "safe-margin": "24px",
                        "unit-8": "32px"
                    },
                    "fontFamily": {
                        "data-speed": ["JetBrains Mono"],
                        "label-caps": ["Space Grotesk"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display-hero": ["Inter"]
                    },
                    "fontSize": {
                        "data-speed": ["64px", { "lineHeight": "1.0", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-hero": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen w-screen flex flex-col">
<!-- Interactive Background Map -->
<div class="fixed inset-0 z-0 bg-surface">
<img class="w-full h-full object-cover opacity-40 grayscale contrast-125" data-alt="dark high contrast satellite map of city streets at night with glowing blue and white traffic arteries" data-location="Tokyo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVtQkg_nXK1iOcSNCuN9z35xqLG8nKfMpGpYFFFoPu-qi-hRuU7ktrnSZGalxds-EHYjy6-FxRTOaBdbBkUKE8yPGXf_xKlvEC41-mo9n7851EPPefB8NHSSAB0EnOA8KMIPLrPHeXOJw8MNl1hcVbPcr_o0k4XkjOjeEkOVkV1folY5kW9H6V2Y6un81uS7uBqHBJ8KJwVf95SxScYzNOhbMtyYC7UGuz7oErrmBouy9GCeXpbA3wbyaBUuqHYvGnWjoglLVxqP4"/>
<!-- Map Overlay Gradient for readability -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/60"></div>
<!-- Pothole Marker Pulse -->
<div class="absolute top-[45%] left-[60%] -translate-x-1/2 -translate-y-1/2">
<div class="relative flex items-center justify-center">
<div class="absolute pothole-pulse w-12 h-12 bg-secondary-container/20 rounded-full"></div>
<div class="absolute pothole-pulse w-8 h-8 bg-secondary-container/40 rounded-full" style="animation-delay: 0.2s"></div>
<div class="w-4 h-4 bg-secondary-container rounded-full shadow-[0_0_15px_#ffe16d]"></div>
<div class="absolute top-6 left-6 whitespace-nowrap bg-black/80 glass-panel px-2 py-1 rounded text-[10px] font-label-caps text-secondary-fixed uppercase">
                    Pothole Cluster
                </div>
</div>
</div>
</div>
<!-- Shared TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-slate-950/80 backdrop-blur-[40px] border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00FFC2]" data-icon="sensors">sensors</span>
<h1 class="font-['Inter'] uppercase tracking-widest font-black text-[#00FFC2] italic text-xl tracking-tighter drop-shadow-[0_0_10px_rgba(0,255,194,0.4)]">ROADWISE</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex flex-col items-end">
<span class="text-[10px] font-label-caps text-primary-container leading-none">GPS LOCKED</span>
<span class="text-[8px] font-label-caps text-on-surface-variant opacity-60">LAT: 35.6762° N</span>
</div>
<div class="w-10 h-10 rounded-full border-2 border-[#00FFC2]/30 overflow-hidden active:scale-95 duration-200 transition-transform cursor-pointer">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a modern tech professional with soft dramatic rim lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAiyVPGd2MoizprQzJ-8y6FTBIrmtFg8sxMLDsuAY20ehqKqFY26I1Br7e03FnakTOyILqGD13jCj6vKfVO9RgMfETAU4MWoGrei7IRqLyp9PpzgYrV-zyV0zcQbvMzeJezc8-MI3bCCs_5CXLCoypRkL3ioeUx1d_2hWQD_Jo0UIipt1z4pMSFZm4j6PVEsHChs4dBhoizaS-NzALxTHKY_m2zRzP06L_wma3Hj6ZfSPaBQAbTC5TYpr1JoiMfQnBz8HrsEDjdulY"/>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex-1 w-full px-safe-margin pt-20 pb-24 overflow-hidden flex flex-col pointer-events-none">
<!-- Top Telemetry Card -->
<div class="pointer-events-auto flex flex-col gap-unit-4">
<div class="glass-panel bg-slate-900/40 rounded-xl p-unit-6 flex items-center justify-between shadow-[0_8px_32px_rgba(0,0,0,0.6)]">
<div class="flex flex-col">
<span class="font-label-caps text-on-surface-variant text-[10px] opacity-70">CURRENT VELOCITY</span>
<div class="flex items-baseline gap-unit-2">
<span class="font-data-speed text-data-speed text-primary-container drop-shadow-[0_0_12px_rgba(0,255,194,0.4)]">64</span>
<span class="font-label-caps text-on-surface text-lg">KM/H</span>
</div>
</div>
<div class="h-12 w-[1px] bg-white/10 mx-unit-4"></div>
<div class="flex flex-col items-end text-right">
<span class="font-label-caps text-on-surface-variant text-[10px] opacity-70">ROAD QUALITY</span>
<div class="mt-unit-1 flex items-center gap-unit-2">
<span class="material-symbols-outlined text-secondary-fixed text-sm" data-icon="activity_zone">activity_zone</span>
<span class="font-label-caps text-secondary-fixed text-lg">FAIR</span>
</div>
<div class="w-24 h-1 bg-white/10 rounded-full mt-unit-2 overflow-hidden">
<div class="h-full bg-secondary-fixed w-2/3 shadow-[0_0_8px_#ffe16d]"></div>
</div>
</div>
</div>
<!-- Hazard Badge Floating -->
<div class="flex justify-center">
<div class="bg-primary-container text-on-primary px-unit-6 py-unit-2 rounded-full flex items-center gap-unit-2 shadow-[0_0_20px_rgba(0,255,194,0.3)] border border-primary-container/20">
<span class="material-symbols-outlined text-[18px]" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-label-caps text-[14px]">24 HAZARDS DETECTED</span>
</div>
</div>
</div>
<!-- Spacer for central map view -->
<div class="flex-1"></div>
<!-- Monitoring Switch Thumb Zone -->
<div class="pointer-events-auto flex flex-col items-center gap-unit-4 mb-unit-6">
<div class="flex flex-col items-center gap-unit-2">
<span class="font-label-caps text-[10px] text-primary-container tracking-[0.3em] opacity-80">MONITORING SYSTEM</span>
<!-- Tactile Switch -->
<button class="relative w-48 h-16 bg-surface-container-low rounded-full border border-white/5 p-unit-1 shadow-inner active:scale-95 transition-transform">
<!-- Switch Track -->
<div class="absolute inset-0 bg-gradient-to-r from-primary-container/10 to-transparent rounded-full opacity-50"></div>
<!-- Handle (Active State) -->
<div class="absolute right-unit-1 top-unit-1 bottom-unit-1 w-24 bg-primary-container rounded-full flex items-center justify-center recording-pulse">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-on-primary animate-pulse"></div>
<span class="text-on-primary font-label-caps text-[12px]">ACTIVE</span>
</div>
</div>
<!-- Off Label -->
<div class="absolute left-unit-8 top-1/2 -translate-y-1/2 font-label-caps text-on-surface-variant/40 text-[12px]">STOP</div>
</button>
</div>
</div>
</main>
<!-- Shared BottomNavBar -->
<nav class="fixed bottom-0 w-full h-20 bg-black flex justify-around items-center px-4 pb-safe z-50 border-t border-white/5 shadow-[0_-10px_20px_rgba(0,0,0,0.8)]">
<!-- HUD (Active) -->
<a class="flex flex-col items-center justify-center text-[#00FFC2] drop-shadow-[0_0_12px_rgba(0,255,194,0.6)] group" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="speed" data-weight="fill" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-wider mt-1">HUD</span>
</a>
<!-- Hazards -->
<a class="flex flex-col items-center justify-center text-slate-600 hover:text-[#00FFC2]/80 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="warning">warning</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-wider mt-1">Hazards</span>
</a>
<!-- History -->
<a class="flex flex-col items-center justify-center text-slate-600 hover:text-[#00FFC2]/80 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-wider mt-1">History</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-slate-600 hover:text-[#00FFC2]/80 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-wider mt-1">Settings</span>
</a>
</nav>
<!-- HUD Overlay Scanlines/Glitch effect -->
<div class="fixed inset-0 pointer-events-none z-[60] opacity-[0.03] bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>
</body></html>
